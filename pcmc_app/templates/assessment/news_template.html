{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website News</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F77F00;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        h1 {
            margin-top: 0;
        }

        .rss-widget {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }

        li img {
            max-width: 100px;
            margin-right: 15px;
            border-radius: 5px;
        }

        li h2 {
            margin: 0;
            font-size: 1.2em;
        }

        li p {
            margin: 5px 0;
        }

        li small {
            color: #666;
        }

        a {
            text-decoration: none;
            color: #007bff;
        }

        a:hover {
            text-decoration: underline;
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .btn-reload {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            display: inline-block;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-reload:hover {
            background-color: #45a049;
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 15px;
                height: auto;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn-reload {
                width: 100%;
            }

            li {
                flex-direction: column;
                align-items: flex-start;
            }

            li img {
                max-width: 100%;
                margin: 0 0 10px 0;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class='body-Container flex col h-full'>
        <div class='App flex col'>
            <div class='subject_component flex px-4'>
                <div class='subject-a flex middle center'>
                    <a href="{% url 'home' %}">
                        <img src="{% static './Assets/Tepros.png' %}" alt='Tepros'>
                    </a>
                </div>
                <div class="flex-1"></div>
                <div class="responsive-pcmcimg flex middle center">
                    <img src="{% static './Assets/pcmc logo.png' %}" alt="pcmc" />
                </div>
                <div class="flex-1"></div>
                <div class="flex row gap-2 p-2" style="width: auto;">
                    <a href="{% url 'subject' %}" style="width:28px;height:28px;">
                        <img src="{% static './Assets/Home.png' %}" alt="" style="width:28px;height:28px;" class="opasity">
                    </a>
                    <a href="{% url 'home' %}" style="width:28px;height:28px;">
                        <img src="{% static './Assets/Loglot.png' %}" alt="" style="width:28px;height:28px;" class="opasity">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <h1>Website News</h1>
        <div class="rss-widget">
            <ul>
                {% for item in news_items %}
                <li>
                    {% if item.thumbnail %}
                    <img src="{{ item.thumbnail }}" alt="Thumbnail">
                    {% endif %}
                    <div>
                        <h2><a href="{{ item.link }}">{{ item.title }}</a></h2>
                        <p>{{ item.summary }}</p>
                        <small>{{ item.published }}</small>
                    </div>
                </li>
                {% endfor %}
            </ul>
        </div>

        <div class="buttons">
            <button class="btn-reload" onclick="location.reload();">Reload</button>
            <a href="{% url 'home' %}" class="btn">Home</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="flex-1"></div>
    <div class="w-full">
        <div class="responsive-contantHome w-full flex sm-flex llg-hide middle center p-6">
            <span><img src="{% static './Assets/powered by.png' %}" /></span>
        </div>
    </div>

</body>
</html>
