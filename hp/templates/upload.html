{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branding</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-image: url(" {% static 'css/Assets/Background.png' %} ");
        background-size: cover;
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      .branding-container {
        width: 90%;
        max-width: 800px;
        background-color: transparent;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      }

      .branding-container h1 {
        font-size: 2rem;
        margin-bottom: 20px;
      }

      .image-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 20px;
      }

      .image-container {
        text-align: center;
      }

      .image-item {
        background-color: #001f3f;
        border-radius: 8px;
        padding: 20px;
        cursor: pointer;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .image-item img {
        width: 60px;
        height: 60px;
      }

      .image-label {
        color: black;
        font-size: 0.9rem;
        margin-top: 10px;
      }

      .submit-btn {
        background-color: red;
        color: white;
        padding: 10px 20px;
        font-size: 1rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .back-button {
        position: fixed;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
      }

      .back-button button {
        background-color: #004080;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: 5px;
        transition: background-color 0.3s ease, transform 0.3s ease;
      }

      .back-button button:hover {
        background-color: #002244;
        transform: scale(1.05);
      }

      .back-button button:focus {
        outline: none;
      }

      .message {
        color: rgb(255, 255, 255);
        font-size: 0.9rem;
        position: absolute;
        top: 5px;
        right: 5px;
        background: rgba(0, 255, 0, 0.2);
        padding: 5px;
        border-radius: 3px;
      }

      .logout-btn {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      .logout-btn img {
        width: 40px;
        height: auto;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="branding-container">
      <div class="logout-btn">
        <a href=" {% url 'index' %} "><img src=" {% static 'css/Assets/logout.png' %} " /></a>
      </div>
      <h1>Branding</h1>
      <div class="image-grid">
        <div class="image-container">
          <div
            class="image-item"
            onclick="uploadImage(this, 'Complete Shop Photo')"
          >
            <img src=" {% static 'css/Assets/camera-icon.png' %} " alt="Camera Icon" />
          </div>
          <p class="image-label">Complete Shop Photo</p>
          <span class="upload-status" id="statusCompleteShopPhoto" style="display: none; color: green;">✔</span>
        </div>

        <div class="image-container">
          <div
            class="image-item"
            onclick="uploadImage(this, 'Dealer Board Close shot')"
          >
            <img src=" {% static 'css/Assets/camera-icon.png' %} " alt="Camera Icon" />
          </div>
          <p class="image-label">Dealer Board Close shot</p>
        </div>

        <div class="image-container">
          <div class="image-item" onclick="uploadImage(this, 'Inside Wall')">
            <img src=" {% static 'css/Assets/camera-icon.png' %} " alt="Camera Icon" />
          </div>
          <p class="image-label">Inside Wall</p>
        </div>

        <div class="image-container">
          <div class="image-item" onclick="uploadImage(this, 'Flanges')">
            <img src=" {% static 'css/Assets/camera-icon.png' %} " alt="Camera Icon" />
          </div>
          <p class="image-label">Flanges</p>
        </div>

        <div class="image-container">
          <div class="image-item" onclick="uploadImage(this, 'Dangler')">
            <img src=" {% static 'css/Assets/camera-icon.png' %} " alt="Camera Icon" />
          </div>
          <p class="image-label">Dangler</p>
        </div>

        <div class="image-container">
          <div class="image-item" onclick="uploadImage(this, 'Interaction')">
            <img src=" {% static 'css/Assets/camera-icon.png' %} " alt="Camera Icon" />
          </div>
          <p class="image-label">Interaction</p>
        </div>

        <div class="image-container">
          <div class="image-item" onclick="uploadImage(this, 'Others')">
            <img src=" {% static 'css/Assets/camera-icon.png' %} " alt="Camera Icon" />
          </div>
          <p class="image-label">Others</p>
        </div>
      </div>



      <form method="POST" action="{% url 'upload' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <!-- Hidden field to store category -->
        <input type="hidden" name="category" id="categoryInput" value="">
        <!-- File input for image -->
        <input type="file" name="image" id="fileInput" accept="image/*" style="display: none;">
        <button
    class="submit-btn"
    onclick="window.location.href ='{% url 'selection' %}';"
>
    Submit
</button>
</form>
    </div>
    <div class="back-button">
      <button onclick="window.location.href=' {% url 'catalog' %} ';">
        Back
      </button>
    </div>
    <input
      type="file"
      id="fileInput"
      style="display: none"
      accept="image/*"
      onchange="handleFileUpload(event)"
    />
    <script>
      let currentCategory = null;
      let currentStatusElement = null;
    
      function uploadImage(imageItem, category) {
        currentCategory = category;
        document.getElementById("categoryInput").value = currentCategory;
    
        // Get the corresponding status element
        currentStatusElement = document.getElementById(`status${category.replace(/\s+/g, '')}`);
        
        // Trigger file input
        document.getElementById("fileInput").click();
      }
    
      function handleFileUpload(event) {
        const file = event.target.files[0];
        if (file) {
          // Show the green tick for the selected image
          if (currentStatusElement) {
            currentStatusElement.style.display = "inline";
          }
    
          // Reset file input
          document.getElementById("fileInput").value = "";
        }
      }
    </script>
  </body>
</html>
